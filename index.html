<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google homepage tut</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="top-section">
        <div class="left-section">
            <a href="https://about.google/?fg=1&utm_source=google-CA&utm_medium=referral&utm_campaign=hp-header" target="_blank">About</a>
            <a href="https://store.google.com/CA?utm_source=hp_header&utm_medium=google_ooo&utm_campaign=GS100042&hl=en-CA" target="_blank">Store</a>
        </div>
        <div class="right-section">
            <a href="https://mail.google.com/mail" target="_blank">Gmail</a>
            <a href="https://www.google.com/imghp?hl=en&authuser=0&ogbl" target="_blank">Images</a>
            <img class="menu" src="./images/menuicon.png">
            <img class="pfp" src="./images/Default_pfp.jpg">
        </div>
    </div>

    <div class="middle-section">
        <form class="search-form">
            <img class="google-icon" src="https://cdn-icons-png.flaticon.com/512/5968/5968863.png">

            <div class="search-bar">
                <img class="search-icon" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSkZE05MiT3Ibzl5jhvC6sVa5lQ5HFM4_URtZaAFI763g&s=10">
                <label for="search">Search</label>
                <input type="text" name="search" id="search">
                <img class="voice-search" src="https://blog.expertrec.com/wp-content/uploads/2019/06/Google-Voice.jpg">
                <img class="photo-search" src="https://play-lh.googleusercontent.com/kK7kVusKbtUcQJdL2EybMDDZWN0IVd4inFKi8nOaaNM6c_7oU-mKoHTbQReQ4ToH4_g3e_RIKt48I_DMq7kpfQ">
            </div>

            <div class="search-buttons">
                <button type="submit">Google search</button>
                <button type="submit">I'm feeling lucky</button>
            </div>
        </form>
    </div>

    <div></div>
</body>
</html>
